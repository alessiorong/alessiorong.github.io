<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alessio Rongione — App Developer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F9FAFB;
      min-height: 100vh;
      padding: 48px 24px;
    }
    .container {
      max-width: 560px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .avatar {
      width: 64px;
      height: 64px;
      background: #1F2937;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 24px;
      margin: 0 auto 16px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1F2937;
      margin-bottom: 4px;
    }
    .header p {
      font-size: 14px;
      color: #6B7280;
    }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #9CA3AF;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }
    .app-card {
      background: white;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .app-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 24px;
      flex-shrink: 0;
    }
    .app-icon.calorino { background: #C4622D; }
    .app-icon.mafe     { background: #2563EB; }
    .app-info { flex: 1; }
    .app-info h2 {
      font-size: 17px;
      font-weight: 700;
      color: #1F2937;
      margin-bottom: 3px;
    }
    .app-info p {
      font-size: 13px;
      color: #6B7280;
      margin-bottom: 12px;
    }
    .app-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chip {
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .chip:hover { opacity: 0.75; }
    .chip.privacy   { background: #FEF3C7; color: #92400E; }
    .chip.terms     { background: #F3F4F6; color: #374151; }
    .footer {
      text-align: center;
      margin-top: 40px;
      font-size: 12px;
      color: #D1D5DB;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="avatar">AR</div>
      <h1>Alessio Rongione</h1>
      <p>iOS App Developer</p>
    </div>

    <p class="section-title">App</p>

    <div class="app-card">
      <div class="app-icon calorino">C</div>
      <div class="app-info">
        <h2>Calorino</h2>
        <p>Diario nutrizionale smart con AI</p>
        <div class="app-links">
          <a href="calorino/privacy/" class="chip privacy">Privacy Policy</a>
          <a href="calorino/terms/"   class="chip terms">Termini</a>
        </div>
      </div>
    </div>

    <div class="app-card">
      <div class="app-icon mafe">M</div>
      <div class="app-info">
        <h2>Mafe Balance</h2>
        <p>Personal Finance Manager</p>
        <div class="app-links">
          <a href="https://alessiorong.github.io/mafe-legal/"       class="chip privacy">Privacy Policy</a>
          <a href="https://alessiorong.github.io/mafe-legal/terms.html" class="chip terms">Termini</a>
        </div>
      </div>
    </div>

    <div class="footer">© 2026 Alessio Rongione</div>

  </div>
</body>
</html>
