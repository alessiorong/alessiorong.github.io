<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calorino — Documenti Legali</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F9FAFB;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo {
      width: 64px;
      height: 64px;
      background: #C4622D;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 32px;
      margin: 0 auto 20px;
    }
    h1 { font-size: 26px; font-weight: 800; color: #1F2937; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: #6B7280; margin-bottom: 32px; }
    .links { display: flex; flex-direction: column; gap: 12px; }
    .link-btn {
      display: block;
      padding: 14px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: opacity 0.15s;
    }
    .link-btn:hover { opacity: 0.85; }
    .link-btn.primary { background: #C4622D; color: white; }
    .link-btn.secondary { background: #F3F4F6; color: #1F2937; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">C</div>
    <h1>Calorino</h1>
    <p class="subtitle">Documenti Legali</p>
    <div class="links">
      <a href="privacy/" class="link-btn primary">Privacy Policy</a>
      <a href="terms/" class="link-btn secondary">Termini di Servizio</a>
    </div>
  </div>
</body>
</html>
